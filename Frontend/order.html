<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreshMart Admin — Orders</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="app-wrapper">

    <!-- ════════════ SIDEBAR ════════════ -->
    <aside id="sidebar" class="sidebar">
        <a href="index.html" class="sidebar-brand">
            <div class="brand-icon">🛒</div>
            <div class="brand-text">
                <span class="brand-name">FreshMart</span>
                <span class="brand-sub">Admin Panel</span>
            </div>
        </a>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Main Menu</div>
            <a href="index.html" class="nav-link-item">
                <span class="nav-icon">📊</span>Dashboard
            </a>
            <a href="manage-product.html" class="nav-link-item">
                <span class="nav-icon">📦</span>Products
            </a>
            <a href="order.html" class="nav-link-item active">
                <span class="nav-icon">🧾</span>Orders
            </a>
        </nav>
        <div class="sidebar-footer"><p>© 2026 FreshMart v1.0</p></div>
    </aside>

    <!-- ════════════ MAIN CONTENT ════════════ -->
    <div class="main-content">

        <header class="top-navbar">
            <div class="topbar-left">
                <button id="sidebar-toggle" class="sidebar-toggle">☰</button>
                <h1 class="page-title">🧾 Orders</h1>
            </div>
            <div class="topbar-right">
                <span id="topbar-time" class="topbar-time"></span>
                <div class="topbar-avatar">A</div>
            </div>
        </header>

        <main class="page-content">
            <div class="row g-4">

                <!-- ── LEFT: Place New Order Form ── -->
                <div class="col-lg-5">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">🛒 New Order</span>
                        </div>
                        <div class="section-body">

                            <!-- Customer Name -->
                            <div class="mb-4">
                                <label class="form-label-custom" for="customer-name">Customer Name</label>
                                <input
                                    type="text"
                                    id="customer-name"
                                    class="form-control-custom"
                                    placeholder="e.g. Ravi Kumar"
                                    maxlength="100"
                                />
                            </div>

                            <!-- Order Items Header -->
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                                <label class="form-label-custom" style="margin:0;">Order Items</label>
                                <button class="btn-primary-custom" onclick="addOrderItem()"
                                    style="font-size:12px; padding:6px 12px;">
                                    ➕ Add Item
                                </button>
                            </div>

                            <!-- Column Headers -->
                            <div style="display:grid; grid-template-columns:1fr 120px 110px auto;
                                        gap:10px; padding:0 0 8px; border-bottom:2px solid var(--border);">
                                <span style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted);">Product</span>
                                <span style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted);">Qty</span>
                                <span style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted);">Total</span>
                                <span></span>
                            </div>

                            <!-- Dynamic Order Items Container -->
                            <div id="order-items-container" style="margin-top:8px;"></div>

                            <!-- Grand Total -->
                            <div class="order-total-bar">
                                <span class="order-total-label">Grand Total</span>
                                <span class="order-total-value" id="grand-total">₹0.00</span>
                            </div>

                            <!-- Place Order Button -->
                            <button id="place-order-btn" class="btn-primary-custom w-100 mt-3"
                                style="justify-content:center; padding:12px;">
                                ✅ Place Order
                            </button>

                        </div>
                    </div>
                </div>

                <!-- ── RIGHT: Order History ── -->
                <div class="col-lg-7" id="history">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">
                                📋 Order History
                                <span id="orders-count"
                                    style="background:#fef3c7; color:#92400e; border:1px solid #fde68a;
                                           font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600;">
                                    0
                                </span>
                            </span>
                            <button class="btn-primary-custom" onclick="loadOrders()" style="font-size:12px; padding:7px 14px;">
                                🔄 Refresh
                            </button>
                        </div>
                        <div class="section-body" style="max-height:600px; overflow-y:auto;">
                            <div id="orders-list">
                                <div class="text-center py-4 text-muted" style="font-size:13px;">Loading...</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
